roles:
  - role: Product PM
    owner: Slay
    responsibility: "Audience, promise, product angle, and page fit."
  - role: Knowledge Reviewer
    owner: Sage Ledger
    responsibility: "Source audit, risky claims, and Drive knowledge routing."
  - role: Content Architect
    owner: Bella Quill
    responsibility: "Table of contents, chapter flow, exercises, and templates."
  - role: Writer
    owner: Bella Quill
    responsibility: "Markdown draft in the SlayHack voice."
  - role: Editor
    owner: Nora Sharp
    responsibility: "Clarity, duplication, claims, and conversion logic."
  - role: Brand Reviewer
    owner: Slay
    responsibility: "Tone, persona, vocabulary, and audience match."
  - role: Visual Designer
    owner: Lila Lens
    responsibility: "Cover, chapter openers, panels, character style, and mockups."
  - role: PDF Producer
    owner: Robin
    responsibility: "Pipeline run, PDF export, manifests, logs, and technical checks."
  - role: Monetization Lead
    owner: Roxy Rise
    responsibility: "Sales page, checkout copy, lead magnet, upsell, and tracking plan."
  - role: Captain Gate
    owner: Nayz
    responsibility: "Final approval before sale, checkout activation, or public launch."

hardening:
  - "Remove hardcoded API key fallback."
  - "Make content and output paths configurable."
  - "Keep image manifest resume support."
  - "Compress generated images before PDF embedding."
  - "Write pipeline logs with inputs, outputs, duration, model choices, and failures."
  - "Add PDF bookmarks or an interactive table of contents."

launch_assets:
  - sales page
  - product mockup
  - checkout copy
  - delivery email
  - lead magnet
  - 7-day content push
  - post-purchase next step
  - tracking plan

monetization_lanes:
  - id: fine_wine_35_44
    label: "Fine Wine 35-44 Monetization Lane"
    audience: "women 35-44"
    status: strategy_locked_checkout_locked
    strategy: "Start with the strongest real audience before expanding the full 22-SKU universe."
    boundary: "Checkout, live publish, and public sales stay locked until QA gates, launch assets, and Captain approval are complete."
    next_action: "Use this lane as the source of truth for sales page, checkout copy, delivery email, lead magnet bridge, and the 7-day content push."
    products:
      - role: lead_magnet
        title: "Slay Basics: 30 Hacks"
        status: pdf_ready
        purpose: "Email capture and first trust step before the paid offer."
        next_action: "Bridge readers into Age Like Fine Wine without duplicating the paid promise."
      - role: paid_pilot
        title: "Age Like Fine Wine"
        status: designed_pdf_ready
        purpose: "First paid low-ticket product for the 35-44 audience."
        next_action: "Finish QA and launch asset review."
      - role: order_bump
        title: "Fine Wine 7-Day Glow Routine"
        status: planned
        purpose: "Small practical companion that should not overlap the free 30 Hacks lead magnet."
        next_action: "Draft one-page routine and checkout bump copy."
      - role: next_book
        title: "The Glow Within"
        status: roadmap
        purpose: "Confidence and self-care continuation for the same 35-44 reader."
        next_action: "Produce after Age Like Fine Wine launch package is approved."
      - role: next_book
        title: "She's Got It Together"
        status: roadmap
        purpose: "Life-ease continuation for established women, moms, and career seniors."
        next_action: "Produce after The Glow Within or bundle validation."
    offer_source:
      promise: "Help women 35-44 look more polished, feel more intentional, and treat aging as refinement instead of decline."
      audience: "Women 35-44 in the USA who want elevated beauty, confidence, and realistic routines without Gen Z pressure."
      core_offer: "Age Like Fine Wine PDF with mature-skin beauty guidance, character-led tips, routines, checklists, and a 30-day glow-up path."
      pain_desire:
        - "Old makeup techniques stop working the same way after 35."
        - "Readers want to feel current and elegant without chasing teenage trends."
        - "They need simple routines that fit real schedules and real skin changes."
      what_inside:
        - "Fine Wine Manifesto"
        - "Skincare reboot for 35+ skin"
        - "Foundation and eye-area technique refresh"
        - "SPF and forgotten-zone checklist"
        - "10-minute elevated look"
        - "30-day glow-up checklist"
      bonuses:
        - "Fine Wine 7-Day Glow Routine"
        - "Mature Skin Quick Checklist"
        - "Character tip cards from Auntie V, Bella Mist, Sera, Sunny, Wanda, and Conceal"
      guarantee: "Low-risk digital product framing; refund policy is not active until checkout terms are explicitly approved by Nayz."
      cta: "Start your Fine Wine glow-up"
      checkout_boundary: "Checkout copy is draft-only and cannot be activated until Captain approval."
    launch_copy_assets:
      - key: sales_page
        label: "Sales page draft"
        launch_asset: sales page
        status: review_ready
        path: "docs/monetization/slay_hack/age_like_fine_wine_sales_page.md"
        review_note: "Use as the first reviewable sales page source; checkout remains locked."
      - key: checkout_copy
        label: "Checkout copy draft"
        launch_asset: checkout copy
        status: review_ready
        path: "docs/monetization/slay_hack/age_like_fine_wine_checkout_copy.md"
        review_note: "Draft checkout and order-bump copy only; no payment link is live."
      - key: delivery_email
        label: "Delivery email draft"
        launch_asset: delivery email
        status: review_ready
        path: "docs/monetization/slay_hack/age_like_fine_wine_delivery_email.md"
        review_note: "Delivery copy uses placeholders until file delivery and support terms are approved."
      - key: lead_magnet_bridge
        label: "Lead magnet bridge copy"
        launch_asset: lead magnet
        status: review_ready
        path: "docs/monetization/slay_hack/slay_basics_to_fine_wine_bridge.md"
        review_note: "Bridge from Slay Basics into Age Like Fine Wine without duplicating the free offer."
      - key: seven_day_content_push
        label: "7-day content push draft"
        launch_asset: 7-day content push
        status: review_ready
        path: "docs/monetization/slay_hack/fine_wine_7_day_content_push.md"
        review_note: "Manual publish handoff draft; live posting remains locked."

ebooks:
  - id: age_like_fine_wine
    title: "Age Like Fine Wine"
    project: SlayHack
    pm: Slay
    audience: "women 35-44"
    status: designed_pdf_ready
    role: "first paid low-ticket monetization pilot"
    proof: "Prior handoff reports 22 generated images, 61 PDF pages, 29.9 MB, 57.7 minutes, and about 0.88 USD cost."
    drive:
      folder: "Google Drive / Slay Hack / 20260517-ebook-age-like-fine-wine"
      pdf: "20260517-Age-Like-Fine-Wine.pdf"
      cover: "20260517-cover-age-like-fine-wine.png"
    qa_gates:
      - gate: Content QA
        status: PARTIAL
        check: "Promise, chapter value, exercises, filler, and risky claims."
      - gate: Brand QA
        status: PARTIAL
        check: "SlayHack voice, PM direction, vocabulary, and target-reader match."
      - gate: Visual QA
        status: PARTIAL
        check: "Cover, palette, typography, image consistency, and character usage."
      - gate: PDF Technical QA
        status: PARTIAL
        check: "Dimensions, mobile readability, links, fonts, metadata, and file size."
      - gate: Monetization QA
        status: PARTIAL
        check: "Sales page, checkout copy, delivery email, lead magnet, and tracking."
    launch_assets:
      - name: sales page
        status: review_ready
        note: "Sales page draft exists in the Fine Wine launch copy asset pack."
      - product mockup
      - name: checkout copy
        status: review_ready
        note: "Checkout copy draft exists; no payment link is live."
      - name: delivery email
        status: review_ready
        note: "Delivery email draft exists with placeholder download and support terms."
      - name: lead magnet
        status: review_ready
        note: "Lead magnet bridge draft connects Slay Basics to Age Like Fine Wine."
      - name: 7-day content push
        status: review_ready
        note: "Manual publish handoff draft exists; live posting remains locked."
      - post-purchase next step
      - tracking plan
