monetization_lanes:
  - id: fine_wine_35_44
    label: "Fine Wine 35-44 Monetization Lane"
    audience: "women 35-44"
    status: strategy_locked_checkout_locked
    strategy: "Start with the strongest real audience before expanding the full 22-SKU universe."
    boundary: "Checkout, live publish, and public sales stay locked until QA gates, launch assets, and Captain approval are complete."
    next_action: "Use this lane as the source of truth for sales page, checkout copy, delivery email, checkout terms, lead magnet bridge, and the 7-day content push."
    products:
      - role: lead_magnet
        title: "Slay Basics: 30 Hacks"
        status: pdf_ready
        purpose: "Email capture and first trust step before the paid offer."
        next_action: "Bridge readers into Age Like Fine Wine without duplicating the paid promise."
      - role: paid_pilot
        title: "Age Like Fine Wine"
        status: designed_pdf_ready
        purpose: "First paid low-ticket product for the 35-44 audience."
        next_action: "Finish QA and launch asset review."
      - role: order_bump
        title: "Fine Wine 7-Day Glow Routine"
        status: planned
        purpose: "Small practical companion that should not overlap the free 30 Hacks lead magnet."
        next_action: "Draft one-page routine and checkout bump copy."
      - role: next_book
        title: "The Glow Within"
        status: roadmap
        purpose: "Confidence and self-care continuation for the same 35-44 reader."
        next_action: "Produce after Age Like Fine Wine launch package is approved."
      - role: next_book
        title: "She's Got It Together"
        status: roadmap
        purpose: "Life-ease continuation for established women, moms, and career seniors."
        next_action: "Produce after The Glow Within or bundle validation."
    offer_source:
      promise: "Help women 35-44 look more polished, feel more intentional, and treat aging as refinement instead of decline."
      audience: "Women 35-44 in the USA who want elevated beauty, confidence, and realistic routines without Gen Z pressure."
      core_offer: "Age Like Fine Wine PDF with mature-skin beauty guidance, character-led tips, routines, checklists, and a 30-day glow-up path."
      pain_desire:
        - "Old makeup techniques stop working the same way after 35."
        - "Readers want to feel current and elegant without chasing teenage trends."
        - "They need simple routines that fit real schedules and real skin changes."
      what_inside:
        - "Fine Wine Manifesto"
        - "Skincare reboot for 35+ skin"
        - "Foundation and eye-area technique refresh"
        - "SPF and forgotten-zone checklist"
        - "10-minute elevated look"
        - "30-day glow-up checklist"
      bonuses:
        - "Fine Wine 7-Day Glow Routine"
        - "Mature Skin Quick Checklist"
        - "Character tip cards from Auntie V, Bella Mist, Sera, Sunny, Wanda, and Conceal"
      guarantee: "Low-risk digital product framing; refund and support terms are drafted but not active until checkout terms are explicitly approved by Nayz."
      cta: "Start your Fine Wine glow-up"
      checkout_boundary: "Checkout copy is draft-only and cannot be activated until Captain approval."
    launch_copy_assets:
      - key: sales_page
        label: "Sales page draft"
        launch_asset: sales page
        status: review_ready
        path: "docs/monetization/slay_hack/age_like_fine_wine_sales_page.md"
        review_note: "Use as the first reviewable sales page source; checkout remains locked."
      - key: checkout_copy
        label: "Checkout copy draft"
        launch_asset: checkout copy
        status: review_ready
        path: "docs/monetization/slay_hack/age_like_fine_wine_checkout_copy.md"
        review_note: "Draft checkout and order-bump copy only; no payment link is live."
      - key: delivery_email
        label: "Delivery email draft"
        launch_asset: delivery email
        status: review_ready
        path: "docs/monetization/slay_hack/age_like_fine_wine_delivery_email.md"
        review_note: "Delivery copy now includes support, refund, and disclaimer boundaries; links remain placeholders until file delivery is approved."
      - key: checkout_terms
        label: "Checkout terms draft"
        launch_asset: checkout terms
        status: review_ready
        path: "docs/monetization/slay_hack/age_like_fine_wine_checkout_terms.md"
        review_note: "Draft support, refund, delivery, buyer expectation, and checkout preflight terms. Not active until Captain approval."
      - key: lead_magnet_bridge
        label: "Lead magnet bridge copy"
        launch_asset: lead magnet
        status: review_ready
        path: "docs/monetization/slay_hack/slay_basics_to_fine_wine_bridge.md"
        review_note: "Bridge from Slay Basics into Age Like Fine Wine without duplicating the free offer."
      - key: seven_day_content_push
        label: "7-day content push draft"
        launch_asset: 7-day content push
        status: review_ready
        path: "docs/monetization/slay_hack/fine_wine_7_day_content_push.md"
        review_note: "Manual publish handoff draft; live posting remains locked."

ebooks:
  - id: age_like_fine_wine
    title: "Age Like Fine Wine"
    project: SlayHack
    pm: Slay
    audience: "women 35-44"
    status: qa_blocked
    role: "first paid low-ticket monetization pilot"
    proof: "Current verified PDF proof is 39 pages, 6 x 8 inches, about 9.5 MB, text-extractable, bookmarked, and SHA-256 92b6baa2e0bc7cc53ed3d33d9aabe4e33f5d70680dd9b4e96391c5807e236e63. Earlier 61-page/29.9 MB handoff language is historical and no longer treated as current proof."
    source_integrity:
      status: blocked
      current_source_of_truth: "Rendered PDF proof only; matching editable source was not found in the Drive folder."
      blocker: "Registered DOCX is a different 40 Life Hacks product, not Age Like Fine Wine."
      repair_packet: "docs/monetization/slay_hack/age_like_fine_wine_source_repair_packet.md"
      required_next_action: "Create or replace the editable source with a matching Age Like Fine Wine source document, then regenerate the PDF."
    captain_sale_gate:
      label: "Captain sale approval"
      status: locked
      action_label: "Captain Approve E-book For Sale"
      locked_label: "Sale approval locked"
      boundary: "Checkout, public sale, live publish, paid traffic, and automatic fulfillment remain locked until all QA gates, launch assets, source integrity, and Captain approval are complete."
    drive:
      folder: "Ebook Project"
      artifacts:
        - key: pdf
          label: "Rendered PDF proof"
          path: "20260517-Age_Like_Fine_Wine_v1.pdf"
          expected: "Prior handoff reported 61 pages and 29.9 MB."
        - key: docx_source
          label: "Editable source document"
          path: "slay_hack_ebook_updated.docx"
          expected: "Registered source is currently a different 40 Life Hacks product; replace with matching Age Like Fine Wine source before sale."
        - key: universe_map
          label: "E-book universe map"
          path: "ebook_universe_map.png"
          expected: "Visual map for the broader Slay e-book universe."
        - key: knowledge_base
          label: "E-book knowledge base"
          path: "20260517-Ebook-Knowledge-Base.md"
          expected: "Source knowledge for the product lane and PM review."
        - key: visual_strategy
          label: "Visual strategy"
          path: "20260517-Slay-Ebook-Visual-Strategy.md"
          expected: "Visual direction before PDF or launch mockup revisions."
    qa_gates:
      - gate: Content QA
        status: PARTIAL
        check: "Promise, chapter value, exercises, filler, and risky claims."
        note: "Useful 10-chapter 35+ beauty guide with clear routine value, but skincare/retinol/SPF/collagen claims still need the source repair packet's disclaimer/citation patch applied to the actual editable source and regenerated PDF. Registered editable DOCX is a different 40 Life Hacks product, so source integrity remains blocked."
        reviewed_by: codex
        reviewed_at: "2026-05-18T03:19:25Z"
      - gate: Brand QA
        status: PASS
        check: "SlayHack voice, PM direction, vocabulary, and target-reader match."
        note: "Title, Auntie V/Bella Mist framing, 35-44 audience, refinement-not-decline promise, and SlayHack tone align with the Fine Wine lane."
        reviewed_by: codex
        reviewed_at: "2026-05-18T03:19:25Z"
      - gate: Visual QA
        status: FAIL
        check: "Cover, palette, typography, image consistency, and character usage."
        note: "Cover and palette are polished, but interior is mostly text and tip boxes. It does not meet the visual-first B+C Hybrid strategy, lacks character portraits/icons/panels, and includes a near-blank page before the final CTA."
        reviewed_by: codex
        reviewed_at: "2026-05-18T03:19:25Z"
      - gate: PDF Technical QA
        status: PARTIAL
        check: "Dimensions, mobile readability, links, fonts, metadata, and file size."
        note: "PDF is 39 pages, 6x8 inches, text-extractable, bookmarked, and 9.5 MB. Blockers: missing title/author metadata, no active links despite a shop CTA button, and no matching editable source for a regenerated proof."
        reviewed_by: codex
        reviewed_at: "2026-05-18T03:19:25Z"
      - gate: Monetization QA
        status: PARTIAL
        check: "Sales page, checkout copy, delivery email, lead magnet, and tracking."
        note: "Sales, checkout, delivery, checkout terms, bridge, content-push, post-purchase, and tracking drafts exist. Keep PARTIAL because checkout terms are review-ready but not Captain-approved, and the PDF contains a live-looking slayhack.com/shop CTA before checkout is approved."
        reviewed_by: codex
        reviewed_at: "2026-05-18T03:19:25Z"
