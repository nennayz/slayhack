    <span>01</span>
    <strong>Daily Slate</strong>

  </a>
  <a class="workflow-rail-step {{ 'active' if path == '/aurora/approval-queue' else '' }}" href="/aurora/approval-queue">

  <a class="workflow-rail-step {{ 'active' if path == '/aurora/workflow' else '' }}" href="/aurora/workflow">
