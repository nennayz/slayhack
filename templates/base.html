<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NayzFreedom Fleet</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
<header class="topbar">
  <div class="topbar-brand-row">
    <a class="brand" href="/">
      <span class="brand-name">NayzFreedom Fleet</span>
      <span class="brand-kicker">Aurora / SlayHack Voyage</span>
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
  <nav aria-label="Fleet navigation">
    <div class="nav-group nav-primary">
      <div class="nav-group-links">
        <a class="{{ 'active' if request.url.path == '/' else '' }}" href="/">Deck</a>
        <a class="{{ 'active' if request.url.path == '/aurora' else '' }}" href="/aurora">Aurora</a>
        <a class="{{ 'active' if request.url.path == '/aurora/ebooks' else '' }}" href="/aurora/ebooks">E-books</a>
        <a class="{{ 'active' if request.url.path == '/ops' else '' }}" href="/ops">Ops</a>
      </div>
    </div>
    <details class="nav-group nav-dropdown">
      <summary class="{{ 'active' if request.url.path in ['/aurora/daily-slate', '/aurora/approval-queue', '/aurora/generation', '/aurora/manual-posting', '/aurora/learning', '/project-admin', '/readiness', '/freedom', '/lyra'] or request.url.path.startswith('/aurora/crew') or request.url.path.startswith('/scout') else '' }}">More</summary>
      <div class="nav-group-links">
        <a class="{{ 'active' if request.url.path == '/aurora/daily-slate' else '' }}" href="/aurora/daily-slate">Slate</a>
        <a class="{{ 'active' if request.url.path == '/aurora/approval-queue' else '' }}" href="/aurora/approval-queue">Approvals</a>
        <a class="{{ 'active' if request.url.path == '/aurora/generation' else '' }}" href="/aurora/generation">Generation</a>
        <a class="{{ 'active' if request.url.path == '/aurora/manual-posting' else '' }}" href="/aurora/manual-posting">Manual</a>
        <a class="{{ 'active' if request.url.path == '/aurora/learning' else '' }}" href="/aurora/learning">Learning</a>
        <a class="{{ 'active' if request.url.path.startswith('/aurora/crew') else '' }}" href="/aurora/crew">Crew</a>
        <a class="{{ 'active' if request.url.path.startswith('/scout') else '' }}" href="/scout/">Scout</a>
        <a class="{{ 'active' if request.url.path == '/project-admin' else '' }}" href="/project-admin">Projects</a>
        <a class="{{ 'active' if request.url.path == '/readiness' else '' }}" href="/readiness">Readiness</a>
        <a class="{{ 'active' if request.url.path == '/freedom' else '' }}" href="/freedom">Freedom</a>
        <a class="{{ 'active' if request.url.path == '/lyra' else '' }}" href="/lyra">Lyra</a>
      </div>
    </details>
  </nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
<script>
(function () {
  var btn = document.querySelector('.nav-toggle');
  if (!btn) return;
  btn.addEventListener('click', function () {
    var header = btn.closest('header');
    var open = header.classList.toggle('nav-open');
    btn.setAttribute('aria-expanded', String(open));
  });
  document.addEventListener('click', function (e) {
    if (!e.target.closest('.topbar')) {
      document.querySelector('.topbar').classList.remove('nav-open');
      btn.setAttribute('aria-expanded', 'false');
    }
  });
})();
</script>
</body>
</html>
