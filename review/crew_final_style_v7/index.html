<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crew Final Style v7 Review</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #090b0f;
      color: #f4efe7;
    }
    body {
      margin: 0;
      padding: 32px;
      background: radial-gradient(circle at top, #18202b 0, #090b0f 44%);
    }
    header {
      max-width: 1120px;
      margin: 0 auto 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: #b8c0cb;
    }
    .notes-link {
      display: inline-block;
      margin-top: 12px;
      color: #8bd3ff;
      font-weight: 700;
      text-decoration: none;
    }
    .notes-link:hover {
      text-decoration: underline;
    }
    .group {
      max-width: 1120px;
      margin: 0 auto 28px;
    }
    .group img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 20px 70px rgba(0,0,0,.45);
    }
    .grid {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 18px;
    }
    figure {
      margin: 0;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      overflow: hidden;
    }
    figure img {
      display: block;
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      object-position: top center;
    }
    figcaption {
      padding: 10px 12px 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <header>
    <h1>Crew Final Style v7 Review</h1>
    <p>Review-only assets. These files are not uploaded to production and do not replace static/crew assets yet.</p>
    <a class="notes-link" href="review_notes.md">Review notes</a>
  </header>
  <section class="group">
    <img src="group-all.png" alt="Full crew group portrait">
  </section>
  <section class="grid">
    <figure><img src="captain-nayz.png" alt="Captain Nayz"><figcaption>Captain Nayz</figcaption></figure>
    <figure><img src="slay.png" alt="Slay"><figcaption>Slay</figcaption></figure>
    <figure><img src="robin.png" alt="Robin"><figcaption>Robin</figcaption></figure>
    <figure><img src="mia.png" alt="Mia Trend"><figcaption>Mia Trend</figcaption></figure>
    <figure><img src="zoe.png" alt="Zoe Spark"><figcaption>Zoe Spark</figcaption></figure>
    <figure><img src="bella.png" alt="Bella Quill"><figcaption>Bella Quill</figcaption></figure>
    <figure><img src="lila.png" alt="Lila Lens"><figcaption>Lila Lens</figcaption></figure>
    <figure><img src="vera-reel.png" alt="Vera Reel"><figcaption>Vera Reel</figcaption></figure>
    <figure><img src="nora.png" alt="Nora Sharp"><figcaption>Nora Sharp</figcaption></figure>
    <figure><img src="roxy.png" alt="Roxy Rise"><figcaption>Roxy Rise</figcaption></figure>
    <figure><img src="emma.png" alt="Emma Heart"><figcaption>Emma Heart</figcaption></figure>
    <figure><img src="iris-gauge.png" alt="Iris Gauge"><figcaption>Iris Gauge</figcaption></figure>
    <figure><img src="sage-ledger.png" alt="Sage Ledger"><figcaption>Sage Ledger</figcaption></figure>
    <figure><img src="nami.png" alt="Nami"><figcaption>Nami</figcaption></figure>
    <figure><img src="genie.png" alt="Genie"><figcaption>Genie</figcaption></figure>
  </section>
</body>
</html>
